name: Release Check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  release-check:
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "SplCiPassw0rd!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P SplCiPassw0rd! -C -Q \"SELECT 1\" || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 30
    env:
      NODE_ENV: test
      DB_SERVER: 127.0.0.1
      DB_PORT: 1433
      DB_NAME: SPLSqlServerCI
      DB_BOOTSTRAP_DATABASE: master
      DB_USER: sa
      DB_PASSWORD: SplCiPassw0rd!
      SPL_AUTH_SECRET: spl-ci-secret-please-change
      SPL_MONITORING_TOKEN: spl-ci-monitoring-token
      CORS_ALLOWED_ORIGINS: same-origin,http://127.0.0.1:5173,http://localhost:5173
      RATE_LIMIT_ENABLED: true
      DB_ENCRYPT: false
      DB_TRUST_SERVER_CERTIFICATE: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            spl-frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix spl-frontend

      - name: Run release check
        run: npm run release:check
